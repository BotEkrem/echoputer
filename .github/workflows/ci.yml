name: CI

# Build + check the firmware on every push to main and every pull request, and
# publish a flashable echoputer-*.bin for EACH feature variant (Game Boy DMG/colour,
# MP3 player, or the lean base) two ways: a per-run CI artifact, and — on pushes to
# main — as a per-commit GitHub Release (the newest is the repo's /releases/latest), so
# anyone can grab the image with the features they want from a permanent download page.
# The matrix entries are the hard compile gates; a "self-test" entry compiles that path
# without shipping it.
#
# Feature axes (see Cargo.toml): `emu` = Game Boy (DMG, Peanut-GB), `emugbc` =
# Game Boy Color (Walnut-CGB, implies emu), `player` = MP3 decode in the audio
# Player (minimp3). All variants always include the WAV player + the rest of the
# apps. The `emu`/`emugbc`/`player` builds compile the vendored C in vendor/ with
# the Xtensa GCC the toolchain action provides.

on:
  push:
    branches: [main]
    # Skip the firmware build for docs-only changes (README edits etc.).
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Authenticate cargo-binstall to the GitHub API so it reliably fetches the
  # PREBUILT espflash binary instead of getting rate-limited (7 parallel jobs hit
  # the releases API at once) and falling back to a slow from-source compile.
  GITHUB_TOKEN: ${{ github.token }}

# Least-privilege default: every job's token is READ-ONLY, so the build job — which
# runs third-party crate build scripts, proc-macros and the vendored C compile — can't
# use a leaked token to write to the repo. The `release` job opts into write below.
permissions:
  contents: read

jobs:
  firmware:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      # One variant failing (e.g. a RAM-tight combo) must not cancel the others.
      fail-fast: false
      matrix:
        include:
          - { label: base,                  bin: echoputer-base,               features: '',             upload: 'true' }
          - { label: mp3 player,            bin: echoputer-mp3,                features: 'player',       upload: 'true' }
          - { label: game boy (dmg),        bin: echoputer-gameboy,            features: 'emu',          upload: 'true' }
          - { label: game boy (dmg) + mp3,  bin: echoputer-gameboy-mp3,        features: 'emu,player',   upload: 'true' }
          - { label: game boy color,        bin: echoputer-gameboy-color,      features: 'emugbc',       upload: 'true' }
          - { label: game boy color + mp3,  bin: echoputer-gameboy-color-mp3,  features: 'emugbc,player', upload: 'true' }
          # Compile-only gates (not shippable images): every non-default feature must
          # keep compiling so a path doesn't bit-rot. selftest = drive every radio tool
          # over serial; networktest = the no-radio crypto/parser vectors (HTTP/Digest/
          # base64 + WPA SHA1/HMAC/PBKDF2/EAPOL/wordlist/.22000); irtest/emutest = the IR
          # and emulator boot self-tests; keylog/psramprobe/audiodiag = diagnostics.
          - { label: self-test (gate),      bin: '',                           features: 'selftest',     upload: 'false' }
          - { label: net-test (gate),       bin: '',                           features: 'networktest',  upload: 'false' }
          - { label: ir-test (gate),        bin: '',                           features: 'irtest',       upload: 'false' }
          - { label: emu-test (gate),       bin: '',                           features: 'emutest',      upload: 'false' }
          - { label: keylog (gate),         bin: '',                           features: 'keylog',       upload: 'false' }
          - { label: psram-probe (gate),    bin: '',                           features: 'psramprobe',   upload: 'false' }
          - { label: audio-diag (gate),     bin: '',                           features: 'audiodiag',    upload: 'false' }
    steps:
      - uses: actions/checkout@v4

      # Espressif's Xtensa Rust toolchain (the `esp` channel pinned in
      # rust-toolchain.toml) + LLVM + rust-src + the bare-metal xtensa-esp-elf GCC
      # that build.rs drives (via cc) for the emu/player C cores. rust-src is needed
      # because .cargo/config.toml builds core/alloc from source (build-std).
      - name: Install Xtensa Rust toolchain (esp)
        uses: esp-rs/xtensa-toolchain@v1.7
        with:
          default: true
          buildtargets: esp32s3
          ldproxy: false

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          # Separate cache per variant so differing features don't thrash one cache.
          key: ${{ matrix.bin || matrix.features }}

      # The gate: the firmware must compile with this variant's features.
      - name: Build (release)
        env:
          FEATURES: ${{ matrix.features }}
        run: |
          if [ -n "$FEATURES" ]; then
            cargo build --release --features "$FEATURES"
          else
            cargo build --release
          fi

      # Produce + publish the app-only image for the shippable variants. `save-image`
      # is offline (no device). espflash comes prebuilt via cargo-binstall (fast).
      # Install espflash via cargo-binstall (taiki-e/install-action doesn't support
      # espflash and its binstall fallback flaked). The workflow-level GITHUB_TOKEN
      # authenticates binstall's GitHub API calls so it reliably fetches the PREBUILT
      # binary instead of getting rate-limited into a slow from-source compile (which
      # is what made the `base` job take 6m40s).
      - name: Install cargo-binstall
        if: matrix.upload == 'true'
        uses: cargo-bins/cargo-binstall@main

      - name: Build flashable image (${{ matrix.bin }}.bin)
        if: matrix.upload == 'true'
        run: |
          # --force is REQUIRED: rust-cache restores the "espflash installed" cargo
          # record without the binary itself, so a plain binstall skips the install
          # ("already installed") and `espflash` is then not on PATH (exit 127).
          # --force always lays the (prebuilt, token-authenticated) binary back down.
          cargo binstall -y --force espflash
          espflash save-image --chip esp32s3 \
            target/xtensa-esp32s3-none-elf/release/echoputer ${{ matrix.bin }}.bin

      - name: Upload firmware artifact
        if: matrix.upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.bin }}
          path: ${{ matrix.bin }}.bin
          if-no-files-found: error

  # Build the host-side WPA crack-offload server (offload/crack-server) as a fully
  # STATIC x86_64 Linux binary so it can be dropped on the Oracle/Xeon box with no
  # toolchain. Built from a COPY outside the repo so the root .cargo/config.toml — which
  # forces the xtensa target + a no_std build-std — isn't inherited; a clean stable
  # build against the prebuilt musl std instead.
  crack-server:
    name: crack-server (linux-musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable Rust + musl target
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add x86_64-unknown-linux-musl --toolchain stable
          sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build static musl binary
        run: |
          mkdir -p "$RUNNER_TEMP/cs"
          cp offload/crack-server/Cargo.toml "$RUNNER_TEMP/cs/"
          cp -r offload/crack-server/src "$RUNNER_TEMP/cs/"
          cd "$RUNNER_TEMP/cs"
          cargo +stable build --release --target x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/crack-server \
            "$GITHUB_WORKSPACE/crack-server-x86_64-linux"
          cd "$GITHUB_WORKSPACE"
          file crack-server-x86_64-linux || true
          # checksum the server-install.sh verifies BEFORE installing the binary as root
          sha256sum crack-server-x86_64-linux > crack-server-x86_64-linux.sha256
      - name: Upload crack-server artifact
        uses: actions/upload-artifact@v4
        with:
          name: crack-server-x86_64-linux
          path: |
            crack-server-x86_64-linux
            crack-server-x86_64-linux.sha256
          if-no-files-found: error

  # Cut a release PER COMMIT on every push to main: download the .bin variants the
  # matrix just built and attach them to a GitHub Release tagged with the commit's
  # short SHA, so every build is preserved and you can tell exactly which one someone
  # downloaded (a single rolling release is overwritten + loses that history). The
  # newest is marked --latest, so the repo's /releases/latest URL always points at it.
  # Only the flashable .bin ships — that's the whole firmware image; the ELF isn't
  # needed to run it. Runs only when all variants built (needs: firmware), never on PRs.
  release:
    name: release
    needs: [firmware, crack-server]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out (full history — for offload/server-install.sh + the orphan-release prune)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download the built artifacts (.bin variants + crack-server)
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish a per-commit release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT="${GITHUB_SHA:0:7}"
          # The releases page sorts by TAG NAME descending (not by date), so a bare
          # short-SHA tag never lands the newest build on top. Lead the tag with a
          # zero-padded, monotonic run number so lexicographic order == build order;
          # the 'r' keeps it above any older bare-SHA (hex) tags during the changeover.
          # run_number is stable across re-runs, so a re-run still replaces its release.
          TAG="$(printf 'r%05d' "$GITHUB_RUN_NUMBER")-$SHORT"
          # Re-run safety: drop this run's release if it already exists, then make
          # it fresh. Other commits' releases are untouched (history accumulates).
          gh release delete "$TAG" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh release create "$TAG" \
            dist/*/*.bin \
            dist/crack-server-x86_64-linux/crack-server-x86_64-linux \
            dist/crack-server-x86_64-linux/crack-server-x86_64-linux.sha256 \
            offload/server-install.sh \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Build #$GITHUB_RUN_NUMBER ($SHORT) — $(date -u +%Y-%m-%d)" \
            --latest \
            --notes "Build of commit \`$SHORT\`. **Firmware:** grab the \`.bin\` for the features you want (see the README's *Cargo features* table) — install from bmorcelli's Launcher off an SD card, or over USB with \`espflash write-bin 0x10000 <file>.bin\`. **WPA crack-offload server (optional):** on an Ubuntu box run \`curl -fsSL https://github.com/$GITHUB_REPOSITORY/releases/latest/download/server-install.sh | sudo bash\` — installs hashcat + the static \`crack-server\`, generates a PSK, and runs it as a hardened systemd service. **Auth:** every request is signed with \`X-Offload-Sig: HMAC-SHA256(PSK, body)\` (the PSK never crosses the wire), the server binds \`127.0.0.1\`-only unless a key is set, and the installer SHA256-verifies the binary before installing it as root. Still plain HTTP, so keep it on a trusted LAN / behind a firewall."

      - name: Prune orphaned releases (tag commit no longer in history)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # After a history rewrite (filter-repo + force-push) the old per-commit release
          # tags point at commits that no longer exist on this branch. Drop any release
          # whose tagged commit is gone from the current history. CONSERVATIVE: delete only
          # when we POSITIVELY confirm the commit is absent — skip on any lookup hiccup, so
          # a flaky API never nukes a still-valid release.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName \
            --jq '.[].tagName' |
          while read -r tag; do
            [ -n "$tag" ] || continue
            sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$tag" --jq '.object.sha' 2>/dev/null)" || sha=""
            [ -n "$sha" ] || { echo "skip $tag (no resolvable tag ref)"; continue; }
            if commit="$(git rev-parse -q --verify "${sha}^{commit}" 2>/dev/null)" \
               && git merge-base --is-ancestor "$commit" HEAD 2>/dev/null; then
              : # the tagged commit is still in this branch's history — keep it
            else
              echo "Pruning orphaned release: $tag (commit ${sha:0:7} not in history)"
              gh release delete "$tag" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY"
            fi
          done

      - name: Prune old releases (keep the newest 10)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          KEEP=10
          # List every release newest-first, skip the KEEP newest, delete the rest
          # (+ their tags). Also cleans up the old rolling "latest" release over time.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 \
            --json tagName,createdAt \
            --jq "sort_by(.createdAt) | reverse | .[$KEEP:] | .[].tagName" |
          while read -r tag; do
            [ -n "$tag" ] || continue
            echo "Pruning old release: $tag"
            gh release delete "$tag" --cleanup-tag --yes --repo "$GITHUB_REPOSITORY"
          done

      - name: Prune dangling tags (no backing release)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Keep the tag set in sync with the release set. A history rewrite (or a release
          # pruned back when `--cleanup-tag` didn't yet exist) can strand tags that no
          # longer have a release; drop those so the Tags page mirrors the Releases page.
          # SAFETY: bail if the release list comes back empty (API hiccup) so we never
          # wipe every tag.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 1000 --json tagName --jq '.[].tagName' | sort > /tmp/rel_tags
          [ -s /tmp/rel_tags ] || { echo "no releases listed — skipping tag prune"; exit 0; }
          git ls-remote --tags origin 2>/dev/null | sed 's#.*refs/tags/##; s/\^{}//' | sort -u > /tmp/all_tags
          comm -23 /tmp/all_tags /tmp/rel_tags | while read -r tag; do
            [ -n "$tag" ] || continue
            echo "Pruning dangling tag (no release): $tag"
            gh api -X DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$tag" 2>/dev/null || true
          done
